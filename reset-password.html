<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - LY9</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0ea5e9; --secondary: #f97316; --bg: #0b0f19; --surface: #1e293b; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background-color: var(--surface); padding: 2.5rem; border-radius: 12px; border: 1px solid var(--primary); box-shadow: 0 10px 30px rgba(14, 165, 233, 0.15); max-width: 400px; width: 100%; text-align: center; }
        input { width: 100%; padding: 1rem; margin-top: 1.5rem; margin-bottom: 1rem; background: var(--bg); border: 1px solid #334155; color: white; border-radius: 8px; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--primary); }
        button { background: linear-gradient(135deg, var(--primary), #0284c7); color: white; border: none; padding: 1rem; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; text-transform: uppercase; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4); }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: var(--primary);"><i class="fa-solid fa-lock"></i> Criar Nova Senha</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-top: 10px;">Digite sua nova senha para a conta LY9.</p>
        
        <form onsubmit="updatePassword(event)">
            <input type="password" id="newPassword" placeholder="Sua nova senha" required minlength="6">
            <button type="submit" id="btnSalvar"><i class="fa-solid fa-floppy-disk"></i> Salvar Nova Senha</button>
        </form>
        <p id="msg" style="margin-top: 15px; font-weight: bold;"></p>
    </div>

    <script>
        var supabaseUrl = 'https://qpdrvvjkokqrzzjjialy.supabase.co';
        var supabaseKey = 'sb_publishable_rT-zGqAU4aruy6C03vgrCw_qFpqfeDV';
        var supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function updatePassword(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            const msg = document.getElementById('msg');
            const newPassword = document.getElementById('newPassword').value;

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Salvando...';
            btn.disabled = true;

            // O Supabase atualiza a senha do usuário que clicou no link
            const { error } = await supabase.auth.updateUser({ password: newPassword });

            if (error) {
                msg.style.color = "#ef4444";
                msg.innerText = "Erro: O link pode ter expirado. Tente solicitar novamente.";
                btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Salvar Nova Senha';
                btn.disabled = false;
            } else {
                msg.style.color = "#22c55e";
                msg.innerHTML = "Senha alterada com sucesso! Redirecionando...";
                setTimeout(() => { window.location.href = 'ly9.html'; }, 2000);
            }
        }
    </script>
</body>
</html>
