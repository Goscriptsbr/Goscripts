<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Super Gato Bros</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body {
    margin: 0; padding: 0; background-color: #0f0f1b;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    touch-action: none; overflow: hidden;
  }

  #gameWrapper {
      display: flex; flex-direction: column; align-items: center; position: relative;
  }

  #gameContainer { 
    position: relative; width: 360px; height: 620px; 
    overflow: hidden; border-radius: 12px; 
    box-shadow: 0 15px 30px rgba(0,0,0,0.8); border: 4px solid #222; 
    transition: background 0.5s; 
  }
  
  canvas { display: block; }
  
  /* --- HUD & MINIMAPA --- */
  #ui { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; flex-direction: column; z-index: 10; pointer-events: none;}
  #topStats { display: flex; justify-content: space-between; color: white; font-weight: 900; text-shadow: 2px 2px 0px #000; font-size: 20px; }
  
  #minimapContainer { position: relative; margin-top: 15px; height: 8px; background: rgba(0,0,0,0.6); border-radius: 4px; border: 2px solid #2c3e50; box-shadow: inset 0 0 5px #000; pointer-events: none;}
  #minimapCat { position: absolute; top: -8px; left: 0%; font-size: 20px; transition: left 0.1s linear; z-index: 2; }
  #minimapFlag { position: absolute; top: -8px; right: -5px; font-size: 18px; z-index: 1; }

  #message { position: absolute; top: 35%; width: 100%; text-align: center; color: #fff; font-size: 28px; font-weight: 900; text-shadow: 3px 3px 0px #000; display: none; z-index: 20; background: rgba(0,0,0,0.8); padding: 30px 15px; backdrop-filter: blur(5px); box-sizing: border-box; }
  
  /* --- TELAS DE MENU E LOJA --- */
  .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(44,62,80,0.9) 0%, rgba(15,15,27,0.95) 100%); z-index: 30; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
  .game-title { font-size: 46px; color: #f1c40f; text-shadow: 0 6px 0 #d35400, 0 12px 20px rgba(0,0,0,0.8); margin-bottom: 40px; text-align: center; font-weight: 900; line-height: 1.1; letter-spacing: 2px; }
  
  .menu-btn { background: linear-gradient(180deg, #e74c3c, #c0392b); color: white; border: none; padding: 15px 20px; font-size: 20px; border-radius: 30px; margin: 10px; cursor: pointer; box-shadow: 0 6px 0 #922b21, 0 10px 10px rgba(0,0,0,0.4); font-weight: bold; width: 260px; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s; display: flex; justify-content: center; align-items: center; gap: 10px; }
  .menu-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #922b21; }
  .btn-continue { background: linear-gradient(180deg, #3498db, #2980b9); box-shadow: 0 6px 0 #1f618d, 0 10px 10px rgba(0,0,0,0.4); }
  .btn-continue:active { box-shadow: 0 0px 0 #1f618d; }
  
  .shop-panel { background: #2c3e50; padding: 25px; border-radius: 20px; text-align: center; border: 4px solid #f1c40f; box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5); width: 85%; max-height: 85%; overflow-y: auto; position: relative; box-sizing: border-box; }
  .shop-title { color: #fff; margin-top: 0; font-size: 26px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px;}
  .shop-coins { color: #f1c40f; font-size: 34px; font-weight: 900; margin: 5px 0 20px 0; text-shadow: 2px 2px 0px #000; }
  
  .btn-buy { background: linear-gradient(180deg, #34495e, #2c3e50); box-shadow: 0 5px 0 #1a252f; font-size: 16px; padding: 12px; width: 100%; margin: 6px 0; border-radius: 12px; text-transform: none; justify-content: flex-start; border: 2px solid #34495e; }
  .btn-buy:active { box-shadow: 0 0px 0 #1a252f; transform: translateY(5px); }
  .btn-buy.equipped { background: linear-gradient(180deg, #f1c40f, #f39c12); color: #000; box-shadow: 0 5px 0 #d35400; border-color: #f39c12; }
  .btn-buy.equipped:active { box-shadow: 0 0px 0 #d35400; }
  .btn-buy i { width: 25px; text-align: center; font-size: 20px; }
  
  .btn-next { background: linear-gradient(180deg, #2ecc71, #27ae60); box-shadow: 0 6px 0 #1e8449; margin-top: 5px; margin-bottom: 20px; width: 100%; font-size: 18px; justify-content: center; border-radius: 15px; }
  .btn-next:active { box-shadow: 0 0px 0 #1e8449; transform: translateY(6px); }
  
  .scroll-indicator { color: #f1c40f; font-size: 14px; margin: 20px 0 10px 0; animation: bounce 1s infinite; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 10px; border: 1px dashed #f39c12;}
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }

  #shopError { color: #ff6b6b; font-size: 15px; font-weight: bold; margin-top: 8px; opacity: 0; transition: opacity 0.3s; height: 18px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
  .shake-anim { animation: shake 0.3s ease-in-out; }
  @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }

  #controls { 
      width: 360px; display: flex; justify-content: space-between; 
      margin-top: -30px; 
      padding: 0 5px; box-sizing: border-box; z-index: 25; pointer-events: none;
  }
  .btn-group { display: flex; gap: 25px; pointer-events: auto; }
  .btn { width: 90px; height: 90px; background: linear-gradient(#f1c40f, #f39c12); border: none; border-radius: 50%; color: white; font-size: 40px; box-shadow: 0 8px 0 #d35400, 0 12px 15px rgba(0,0,0,0.5); user-select: none; outline: none; transition: transform 0.05s; display: flex; align-items: center; justify-content: center; touch-action: none; }
  .btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #d35400; }
  .btn-jump { background: linear-gradient(#e74c3c, #c0392b); box-shadow: 0 8px 0 #922b21; width: 105px; height: 90px; border-radius: 25px; font-weight: bold; font-size: 22px; pointer-events: auto;}
  .btn-jump:active { box-shadow: 0 0px 0 #922b21; }
  #activePowers { display: flex; gap: 6px; margin-top: 8px; justify-content: center; pointer-events: none;}
.power-icon { background: rgba(0,0,0,0.7); border: 1px solid #f1c40f; border-radius: 8px; padding: 4px 8px; color: white; font-weight: bold; font-size: 11px; display: flex; align-items: center; gap: 4px; box-shadow: 0 2px 4px #000; text-transform: uppercase; }
</style>
</head>

          <button class="menu-btn btn-buy" id="btnBuyDoubleJump" onclick="buyItem('doubleJump', 120)"><i class="fa-solid fa-angles-up" style="color: #3498db;"></i> Pulo Duplo (120 <i class="fa-solid fa-coins" style="font-size: 14px; width:auto"></i>)</button>

        </div>
      </div>

      <canvas id="gameCanvas" width="360" height="620"></canvas>
    </div>

    <div id="controls">
      <div class="btn-group">
        <button class="btn" id="btnLeft"><i class="fa-solid fa-caret-left"></i></button>

      </div>

</div>

    errDiv.innerText = msg; errDiv.style.opacity = 1; errDiv.classList.add('shake-anim');
    setTimeout(() => { errDiv.classList.remove('shake-anim'); }, 300);

}

function buyItem(itemType, price) {
    let btn = event.target;
    if(btn.tagName === 'I') btn = btn.parentElement;
    
    if (itemType === 'ninja' && unlocks.unlockedNinja) { unlocks.currentCharacter = 'ninja'; updateShopUI(); saveGame(); return; }
    if (itemType === 'robot' && unlocks.unlockedRobot) { unlocks.currentCharacter = 'robot'; updateShopUI(); saveGame(); return; }
    
    if (itemType === 'life' && lives >= 20) { showShopError("Lotação máxima! Você já tem 20 vidas."); return; }

    if (score >= price) {
        if (itemType === 'doubleJump' && unlocks.hasDoubleJump) { showShopError("Você já possui esta habilidade!"); return; }
        
                score -= price;
        if (itemType === 'life') lives++;
        if (itemType === 'doubleJump') { 
            unlocks.hasDoubleJump = true; 
            if (!unlocks.seenDoubleJump) showTutorial('doubleJump'); // Ativa tutorial do pulo
        }
        if (itemType === 'ninja') { unlocks.unlockedNinja = true; unlocks.currentCharacter = 'ninja'; }
        if (itemType === 'robot') { unlocks.unlockedRobot = true; unlocks.currentCharacter = 'robot'; }

        document.getElementById('shopCoinsVal').innerText = score;
        updateUI(); saveGame(); updateShopUI();
        
        let oldText = btn.innerHTML;
        btn.innerHTML = "<i class='fa-solid fa-check' style='color:#2ecc71'></i> Comprado!"; 
        setTimeout(() => { if(!btn.classList.contains('equipped')) btn.innerHTML = oldText; }, 1000);
    } else { showShopError(`Moedas insuficientes! (Faltam ${price - score})`); }
}

function updateShopUI() {
    let bDouble = document.getElementById('btnBuyDoubleJump'); let bNinja = document.getElementById('btnBuyNinja'); let bRobot = document.getElementById('btnBuyRobot');

function loadLevel(index) {
  currentLevelData = JSON.parse(JSON.stringify(levels[index])); 
  player = { x: 50, y: currentLevelData.platforms[0].y - 50, w: 24, h: 36, vx: 0, vy: 0, onGround: false, hasCape: player?.hasCape || false, hasHairball: player?.hasHairball || false, flyEnergy: 120, facingRight: true, inWater: false };
  camera.x = 0; currentLevelIndex = index; state = 'playing'; invincibleTime = 0; particles = []; hairballs = [];
  keys.left = false; keys.right = false; keys.jump = false; keys.jumpHeld = false; doubleJumpUsed = false;
  
  // Condição especial para a noite e vulcão gerarem estrelas/cinzas flutuantes
  let isNight = index < 3 || index === 6;
  let isVolcano = index === 7;
  
  stars = []; clouds = []; decorations = [];
  
  if (isNight || isVolcano) {
      for(let i=0; i<100; i++) { stars.push({ x: Math.random() * currentLevelData.width, y: Math.random() * 640, size: Math.random() * 1.5 + 0.5, alpha: Math.random() }); }
  }
  
  if (index !== 9 && index !== 8 && index !== 7) { 
      for(let i=0; i<15; i++) { clouds.push({ x: Math.random() * currentLevelData.width, y: Math.random() * 250, speed: Math.random() * 0.5 + 0.1, size: Math.random() * 20 + 20 }); }
  }
  
  currentLevelData.platforms.forEach(p => {
      if (p.type === 0 && p.w > 100 && p.y > 0) { 
          let plantCount = Math.floor(p.w / 150); 
          for(let i=0; i < plantCount; i++) {
              let decType = isNight ? 'alien' : (Math.random() > 0.6 ? 'tree' : 'bush'); 
              if(index === 7 || index === 9) continue; // Sem mato no vulcão e chefe
              decorations.push({ x: p.x + 40 + Math.random() * (p.w - 80), y: p.y, type: decType });
          }
      }
  });

  document.getElementById('message').style.display = 'none'; updateUI();
}

function isColliding(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

function spawnItem(blockX, blockY, type) { currentLevelData.items.push({ x: blockX + 10, y: blockY - 20, w: 20, h: 20, type: type, vy: -5, vx: 1.5, active: true }); }
function spawnDust(x, y, amount, color = 'rgba(236, 240, 241, 0.6)') {
    for(let i=0; i<amount; i++) { particles.push({ x: x + 12 + (Math.random()*10 - 5), y: y + 36, vx: (Math.random() - 0.5) * 2, vy: Math.random() * -2, life: 1.0, size: Math.random() * 6 + 2, color: color }); }
}
function spawnFire(x, y) { particles.push({ x: x + (Math.random()*10 - 5), y: y + (Math.random()*10 - 5), vx: (Math.random() - 0.5), vy: (Math.random() - 0.5), life: 1.0, size: Math.random() * 4 + 2, color: Math.random() > 0.5 ? '#e74c3c' : '#f1c40f' }); }

    hairballs.push({ x: spawnX, y: player.y + 10, w: 10, h: 10, vx: directionRight ? 6 : -6, vy: 0, life: 60 });
    spawnDust(spawnX, player.y + 10, 3, '#bdc3c7'); 
}

// --- LÓGICA (UPDATE) ---
function update(dt) {
  if (state !== 'playing') {
      if(state === 'menu' || state === 'shop') currentLevelData.firebars?.forEach(fb => fb.angle += fb.speed * dt);
      return;
  }
  
  if(invincibleTime > 0) invincibleTime -= dt;

  clouds.forEach(c => { c.x += c.speed * dt; if (c.x > currentLevelData.width + 100) c.x = -100; });

  currentLevelData.firebars.forEach(fb => {
      fb.angle += fb.speed * dt;
      for(let i=10; i<=fb.radius; i+=15) {
          let fx = fb.x + Math.cos(fb.angle) * i; let fy = fb.y + Math.sin(fb.angle) * i;
          if(Math.random() > 0.5) spawnFire(fx, fy); 
          let fHitbox = {x: fx-5, y: fy-5, w: 10, h: 10};
          if(invincibleTime <= 0 && isColliding(player, fHitbox)) takeDamage();
      }
  });

  currentLevelData.platforms.forEach(p => {
      if (p.type === 7) {
          let oldX = p.x;
          if (p.triggered) { p.x += p.vx * dt; if (p.x >= p.endX || p.x <= p.startX) p.vx *= -1; }
          if (player.onGround && Math.abs((player.y + player.h) - p.y) < 1.0 && player.x + player.w > oldX && player.x < oldX + p.w) {
              p.triggered = true; player.x += (p.x - oldX);
          }
      }
  });

  player.inWater = false;
  currentLevelData.water.forEach(w => {
      let wHitbox = {x: w.x, y: w.y + 20, w: w.w, h: w.h - 20}; 
      if(isColliding(player, wHitbox)) player.inWater = true;
  });

  let curSpeed = player.inWater ? SPEED * 0.6 : SPEED;
  let curAccel = player.inWater ? ACCEL * 0.5 : ACCEL;

  if (keys.left) { player.vx -= curAccel * dt; if(player.vx < -curSpeed) player.vx = -curSpeed; player.facingRight = false; } 
  else if (keys.right) { player.vx += curAccel * dt; if(player.vx > curSpeed) player.vx = curSpeed; player.facingRight = true; } 
  else { player.vx *= Math.pow(FRICTION, dt); if(Math.abs(player.vx) < 0.1) player.vx = 0; }

  let wasOnGround = player.onGround;

  if (player.onGround || player.inWater) player.flyEnergy = 120;

  if (player.inWater) {
      doubleJumpUsed = false; 
      if (keys.jump && !keys.jumpHeld) {
          let isNearSurface = false;
          currentLevelData.water.forEach(w => { if (player.x + player.w > w.x && player.x < w.x + w.w && player.y <= w.y + 40) isNearSurface = true; });
          if (isNearSurface) player.vy = JUMP_POWER; 
          else { if (player.vy > 0) player.vy = -3.5; else player.vy -= 3.5; if (player.vy < -6.5) player.vy = -6.5; }
          player.onGround = false; keys.jumpHeld = true; keys.jump = false; 
          spawnDust(player.x, player.y - 10, 3, 'rgba(255,255,255,0.7)'); 
      }
      player.vy += (GRAVITY * 0.35) * dt; 
      let maxWaterFall = MAX_FALL_SPEED * 0.35;
      if(player.vy > maxWaterFall) player.vy = maxWaterFall;
      
  } else {
      if (player.onGround) doubleJumpUsed = false;
      if (keys.jump) {
          if (player.onGround) { player.vy = JUMP_POWER; player.onGround = false; keys.jumpHeld = true; keys.jump = false; spawnDust(player.x, player.y, 5); } 
          else if (unlocks.hasDoubleJump && !doubleJumpUsed && !keys.jumpHeld) { player.vy = JUMP_POWER * 0.9; doubleJumpUsed = true; keys.jumpHeld = true; keys.jump = false; spawnDust(player.x, player.y + 20, 8, '#3498db'); }
      }
      if (player.hasCape && !player.onGround && keys.jumpHeld && Math.abs(player.vx) > 1.5 && player.flyEnergy > 0) { player.vy = FLIGHT_SPEED; player.flyEnergy -= dt; if(Math.random() > 0.7) spawnDust(player.x, player.y + 10, 1, '#f1c40f'); }
      if (!keys.jumpHeld && player.vy < -4) player.vy = -4; 
      player.vy += GRAVITY * dt;
      let fallLimit = (player.hasCape && keys.jumpHeld && player.vy > 0 && player.flyEnergy > 0) ? MAX_FALL_SPEED / 3 : MAX_FALL_SPEED;
      if(player.vy > fallLimit) player.vy = fallLimit;
  }

  let prevY = player.y;
  const allPlatforms = [...currentLevelData.platforms, ...currentLevelData.blocks];

  player.x += player.vx * dt;
  for (let p of allPlatforms) {
    if (p.type !== 5 && p.type !== 7 && isColliding(player, p)) { 
      if (player.vx > 0) player.x = p.x - player.w; else if (player.vx < 0) player.x = p.x + p.w; player.vx = 0;
    }
  }

  if (player.x < 0) { player.x = 0; player.vx = 0; }
  if (player.x > currentLevelData.width - player.w) player.x = currentLevelData.width - player.w;

  player.y += player.vy * dt;
  player.onGround = false;
  
  for (let p of allPlatforms) {
    if (isColliding(player, p)) {
      if (p.type === 5 || p.type === 7) { 
        if (player.vy > 0 && (prevY + player.h) <= p.y + (player.vy * dt) + 4) { player.y = p.y - player.h; player.vy = 0; player.onGround = true; }
      } else { 
        if (player.vy > 0) { player.y = p.y - player.h; player.vy = 0; player.onGround = true; } 
        else if (player.vy < 0) { 
          player.y = p.y + p.h; player.vy = 0; 
          if (p.type === 1 || p.type === 8) { currentLevelData.blocks.splice(currentLevelData.blocks.indexOf(p), 1); score += 5; spawnDust(p.x, p.y-20, 10); updateUI(); } 
          else if (p.type === 2) { p.type = 4; spawnItem(p.x, p.y, 'coin'); } 
          else if (p.type === 3) { p.type = 4; spawnItem(p.x, p.y, 'life'); } 
          else if (p.type === 6) { p.type = 4; spawnItem(p.x, p.y, 'cape'); } 
          else if (p.type === 9 || p.type === 10) { p.type = 4; spawnItem(p.x, p.y, 'hairball'); }
        }
      }
    }
  }

  // FÍSICA E DANO DA LAVA (Fase 8)
  currentLevelData.lava?.forEach(l => {
      let lavaHitbox = {x: l.x, y: l.y + 15, w: l.w, h: l.h - 15};
      if (invincibleTime <= 0 && isColliding(player, lavaHitbox)) takeDamage();
  });

  for (let i = hairballs.length - 1; i >= 0; i--) {
      let hb = hairballs[i]; hb.x += hb.vx * dt; hb.vy += GRAVITY * dt; hb.y += hb.vy * dt; hb.life -= dt;
      for (let p of allPlatforms) { if (hb.vy > 0 && isColliding(hb, p)) { hb.y = p.y - hb.h; hb.vy = -5; } }
      let hit = false;
      for (let j = currentLevelData.enemies.length - 1; j >= 0; j--) {
          let enemy = currentLevelData.enemies[j];
          if (enemy.type !== 'boss' && isColliding(hb, enemy)) { currentLevelData.enemies.splice(j, 1); score += 50; updateUI(); spawnDust(enemy.x, enemy.y, 15, '#fff'); hit = true; break; }
      }
      if (hit || hb.life <= 0 || hb.x < camera.x || hb.x > camera.x + canvas.width) { spawnDust(hb.x, hb.y, 5, '#bdc3c7'); hairballs.splice(i, 1); }
  }

  if(!wasOnGround && player.onGround && !player.inWater) spawnDust(player.x, player.y, 5);

  camera.x += ((player.x - 120) - camera.x) * 0.1 * dt;
  if (camera.x < 0) camera.x = 0;
  if (camera.x > currentLevelData.width - canvas.width) camera.x = currentLevelData.width - canvas.width;

  if (player.y > canvas.height) { loseLife(); return; }

  currentLevelData.enemies.forEach((enemy, index) => {
    if (enemy.type === 'ray') {
        enemy.x += enemy.vx * dt;
        if (enemy.x > enemy.endX || enemy.x < enemy.startX) enemy.vx *= -1;
        enemy.y = enemy.startY + Math.sin((Date.now() / 400) + (enemy.x / 50)) * enemy.amplitude;
    } else {
        enemy.x += enemy.vx * dt; enemy.y += enemy.vy * dt;
        if(enemy.type === 'ground' || enemy.type === 'fish' || enemy.type === 'boss') { if (enemy.x > enemy.endX || enemy.x < enemy.startX) enemy.vx *= -1; } 
        else if (enemy.type === 'fly' || enemy.type === 'jellyfish') { if (enemy.y > enemy.endY || enemy.y < enemy.startY) enemy.vy *= -1; }
    }

    if (enemy.type === 'boss' && enemy.hitTimer > 0) enemy.hitTimer -= dt;

    if (invincibleTime <= 0 && isColliding(player, enemy) && (enemy.type !== 'boss' || enemy.hitTimer <= 0)) {
      if (player.vy > 0 && player.y + player.h < enemy.y + (enemy.h / 2) + 15 && !player.inWater && enemy.type !== 'jellyfish' && enemy.type !== 'ray') { 
        player.vy = ENEMY_BOUNCE_POWER; if(keys.jumpHeld) player.vy -= 2; 
        if (enemy.type === 'boss') {
            enemy.hp--; enemy.hitTimer = 60; score += 100; spawnDust(enemy.x+50, enemy.y, 20);
            if(enemy.hp <= 0) { currentLevelData.enemies.splice(index, 1); score += 500; currentLevelData.goal = {x: 600, y: 310, w: 40, h: 250}; }
        } else { currentLevelData.enemies.splice(index, 1); score += 20; spawnDust(enemy.x, enemy.y, 10); }
        updateUI();
      } else { takeDamage(); }
    }
  });

  currentLevelData.spikes.forEach(spike => {
      let spikeHitbox = {x: spike.x+5, y: spike.y+10, w: spike.w-10, h: spike.h-10};
      if (invincibleTime <= 0 && isColliding(player, spikeHitbox)) takeDamage();
  });

  for (let i = currentLevelData.coins.length - 1; i >= 0; i--) { if (isColliding(player, currentLevelData.coins[i])) { currentLevelData.coins.splice(i, 1); score += 10; updateUI(); } }

  for (let i = currentLevelData.items.length - 1; i >= 0; i--) {
      let item = currentLevelData.items[i]; if(!item.active) continue;
      item.y += item.vy * dt; item.vy += (player.inWater ? GRAVITY*0.2 : GRAVITY) * dt;
      if (item.type === 'coin') {
          if (item.vy > 0) { score += 20; updateUI(); spawnDust(item.x + 10, item.y + 10, 5, '#f1c40f'); currentLevelData.items.splice(i, 1); }
          continue; 
      }
      item.x += item.vx * dt;
      for (let p of allPlatforms) { if (item.vy > 0 && isColliding(item, p) && item.y + item.h - (item.vy * dt) <= p.y + 10) { item.y = p.y - item.h; item.vy = 0; } }
            if (isColliding(player, item)) {
          if (item.type === 'life') lives += 1;
          else if (item.type === 'cape') { 
              player.hasCape = true; player.flyEnergy = 120; unlocks.currentCharacter = 'normal'; updateShopUI(); 
              if (!unlocks.seenCape) showTutorial('cape'); // Ativa tutorial da capa
          }
          else if (item.type === 'hairball') { 
              player.hasHairball = true; 
              if (!unlocks.seenHairball) showTutorial('hairball'); // Ativa tutorial do pelo
          }
          item.active = false; updateUI(); currentLevelData.items.splice(i, 1);
          spawnDust(player.x, player.y, 10, '#3498db');
      } else if (item.y > canvas.height) { currentLevelData.items.splice(i, 1); }
  }

  for(let i = particles.length - 1; i >= 0; i--) {
      let p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= 0.05 * dt; p.size *= Math.pow(0.95, dt);
      if(p.life <= 0) particles.splice(i, 1);
  }

  if (isColliding(player, currentLevelData.goal)) {
    if (currentLevelIndex + 1 < levels.length) {
        state = 'shop'; document.getElementById('shopCoinsVal').innerText = score; updateShopUI();
        document.getElementById('minimapContainer').style.display = 'none'; document.getElementById('shopScreen').style.display = 'flex'; saveGame(); 
    } else { 
        state = 'won'; document.getElementById('minimapContainer').style.display = 'none';
        showMessage("VOCÊ ZEROU! <i class='fa-solid fa-trophy' style='color:#f1c40f'></i><br><span style='font-size:16px'>Derrotou o Rei Cachorro!<br>Toque para reiniciar.</span>"); 
        deleteSaveGame(); 
        canvas.onclick = () => { canvas.onclick = null; document.getElementById('menuScreen').style.display = 'flex'; initGame(); };
    }
  }

  if (state === 'playing') {
      let progress = (player.x / currentLevelData.width) * 100;
      if (progress > 100) progress = 100; if (progress < 0) progress = 0;
      document.getElementById('minimapCat').style.left = `calc(${progress}% - 10px)`;
  }
}

function takeDamage() {
    if (player.hasCape || player.hasHairball) { 
        player.hasCape = false; player.hasHairball = false; invincibleTime = 60; spawnDust(player.x, player.y, 15, '#f1c40f'); 
    } else { loseLife(); }
}

function loseLife() {
    lives--; updateUI();
    if (lives > 0) { loadLevel(currentLevelIndex); } 
    else { 
        state = 'gameover'; document.getElementById('minimapContainer').style.display = 'none';
        unlocks = { hasDoubleJump: false, unlockedNinja: false, unlockedRobot: false, currentCharacter: 'normal' };
        player.hasCape = false; player.hasHairball = false;
        showMessage("GAME OVER <i class='fa-solid fa-skull' style='color:#e74c3c'></i><br><span style='font-size:16px'>Você perdeu seus poderes!<br>Toque para o Menu</span>"); 
        deleteSaveGame(); 
        canvas.onclick = () => { canvas.onclick = null; document.getElementById('menuScreen').style.display = 'flex'; initGame(); };
    }
}

function drawCoin(x, y, offset) {
    let coinSpin = Math.cos(Date.now() / 150 + offset); 
    ctx.save(); ctx.translate(x + 10, y + 10); ctx.scale(coinSpin, 1);
    ctx.fillStyle = '#b8860b'; 
    if (coinSpin > 0) { ctx.beginPath(); ctx.ellipse(-2, 0, 8, 12, 0, 0, Math.PI*2); ctx.fill(); } 
    else { ctx.beginPath(); ctx.ellipse(2, 0, 8, 12, 0, 0, Math.PI*2); ctx.fill(); }
    ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.ellipse(0, 0, 8, 12, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 2; ctx.beginPath(); ctx.ellipse(0, 0, 4, 8, 0, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)'; ctx.beginPath(); ctx.ellipse(-2, -4, 2, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

// --- RENDERIZAÇÃO GRÁFICA ---
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height); 
  
  let isNight = currentLevelIndex < 3 || currentLevelIndex === 6;
  
  let dirtColor = isNight ? '#2c3e50' : '#5c4033'; 
  let dirtDetail = isNight ? '#1a252f' : '#4a3225';
  let grassColor1 = isNight ? '#16a085' : '#27ae60'; 
  let grassColor2 = isNight ? '#1abc9c' : '#2ecc71';
  let onewayColor1 = isNight ? '#8e44ad' : '#e67e22'; 
  let onewayColor2 = isNight ? '#732d91' : '#d35400';

  if (currentLevelIndex === 9) {
      dirtColor = '#2c3e50'; dirtDetail = '#1a252f'; grassColor1 = '#34495e'; grassColor2 = '#2c3e50';
  }
  if (currentLevelIndex === 7) { 
      dirtColor = '#3a0000'; dirtDetail = '#200000'; grassColor1 = '#8b0000'; grassColor2 = '#5c0000';
      onewayColor1 = '#c0392b'; onewayColor2 = '#7b241c';
  }

  // --- DESENHO DE FUNDOS ESPECÍFICOS ---
  if (currentLevelIndex === 7) { 
      // VULCÃO 100% NOVO COM PARALLAX E LAVA FLUINDO
      document.getElementById('gameContainer').style.background = 'linear-gradient(to bottom, #2b0000 0%, #b32400 60%, #ff4500 100%)';
      ctx.save(); ctx.translate(-camera.x * 0.15, 0);
      
      // Camada 1: Montanhas Distantes
      ctx.fillStyle = '#260909';
      ctx.beginPath(); ctx.moveTo(0, 640);
      for(let i=0; i<4000; i+=300) { ctx.lineTo(i+150, 300 + Math.sin(i)*50); ctx.lineTo(i+300, 640); }
      ctx.fill();
      ctx.restore();

      // Camada 2: Vulcões na Frente
      ctx.save(); ctx.translate(-camera.x * 0.3, 0);
      for(let i=-100; i<4000; i+=700) {
          let vx = i + 350; 
          let vy = 200 + Math.cos(i)*50; 

          // Base do vulcão
          ctx.fillStyle = '#140000'; ctx.beginPath(); ctx.moveTo(i, 640); ctx.lineTo(vx - 50, vy); ctx.lineTo(vx + 50, vy); ctx.lineTo(i+700, 640); ctx.fill();

          // Magma e Lavas escorrendo
          ctx.fillStyle = '#ff3300';
          ctx.beginPath(); ctx.moveTo(vx - 40, vy); ctx.lineTo(vx + 40, vy); ctx.lineTo(vx + 20, vy + 80); ctx.lineTo(vx, vy + 40); ctx.lineTo(vx - 20, vy + 120); ctx.fill();

          // Brilho da Erupção pulsante
          let pulse = Math.sin(Date.now() / 200 + i) * 10;
          ctx.fillStyle = `rgba(255, 69, 0, ${0.4 + pulse/100})`;
          ctx.beginPath(); ctx.arc(vx, vy, 60 + pulse, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();

      // Partículas: Cinzas flutuantes subindo (Feito reutilizando as 'stars' do sistema de noite)
      ctx.save(); ctx.translate(-camera.x * 0.2, 0);
      stars.forEach(s => {
          ctx.fillStyle = `rgba(255, 100, 0, ${s.alpha})`;
          ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 1.5, 0, Math.PI*2); ctx.fill();
          s.y -= 0.8; 
          s.x += Math.sin(Date.now()/500 + s.y) * 0.5; // Movimento leve lateral
          if (s.y < 0) s.y = 640;
      });
      ctx.restore();

  } 
  else if (currentLevelIndex === 8) {
      document.getElementById('gameContainer').style.background = 'linear-gradient(to bottom, #001f3f 0%, #0984e3 100%)';
      ctx.save(); ctx.translate(-camera.x * 0.3, 0);
      for(let i=50; i<3500; i+=150) {
          let wave = Math.sin((Date.now()/400) + i) * 15;
          ctx.strokeStyle = 'rgba(46, 204, 113, 0.4)'; ctx.lineWidth = 12; ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(i, 640); ctx.quadraticCurveTo(i + wave, 500, i - wave, 350); ctx.stroke();
          if(Math.random() > 0.90) {
              let bubbleY = 640 - (((Date.now()/20) + i) % 640);
              ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
              ctx.beginPath(); ctx.arc(i + wave/2, bubbleY, Math.random()*5+2, 0, Math.PI*2); ctx.fill();
          }
      }
      ctx.restore();
  }
  else if (currentLevelIndex === 9) {
      document.getElementById('gameContainer').style.background = '#111';
      ctx.save(); ctx.translate(-camera.x * 0.1, 0);
      for(let i=0; i<1500; i+=100) {
          ctx.fillStyle = '#222'; ctx.fillRect(i, 0, 95, 640); 
          if (i % 300 === 0) { 
              ctx.fillStyle = '#5c4033'; ctx.fillRect(i + 40, 250, 10, 40);
              let fireSize = Math.random() * 5;
              ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(i+45, 240, 15 + fireSize, 0, Math.PI*2); ctx.fill();
              ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(i+45, 245, 8 + fireSize, 0, Math.PI*2); ctx.fill();
          }
      }
      ctx.restore();
  }
  else if (isNight) {
      document.getElementById('gameContainer').style.background = 'linear-gradient(to bottom, #0f2027 0%, #203a43 100%)';
      ctx.save(); ctx.translate(-camera.x * 0.1, 0); 
      stars.forEach(s => {
          let alpha = s.alpha + Math.sin(Date.now()/500 + s.x)*0.3;
          ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, Math.min(1, alpha))})`;
          ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
      });
      ctx.restore();
  } else {
      document.getElementById('gameContainer').style.background = 'linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%)';
      ctx.save(); ctx.translate(-camera.x * 0.3, 0); 
      ctx.fillStyle = '#2980b9'; 
      ctx.beginPath(); ctx.moveTo(0, 640); ctx.lineTo(150, 300); ctx.lineTo(350, 640); ctx.fill();
      ctx.beginPath(); ctx.moveTo(300, 640); ctx.lineTo(550, 200); ctx.lineTo(800, 640); ctx.fill();
      ctx.beginPath(); ctx.moveTo(700, 640); ctx.lineTo(950, 350); ctx.lineTo(1200, 640); ctx.fill();
      ctx.restore();
  }

  // Nuvens
  if(currentLevelIndex !== 7 && currentLevelIndex !== 8 && currentLevelIndex !== 9) {
      ctx.save();
      ctx.translate(-camera.x * 0.2, 0); 
      ctx.fillStyle = isNight ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.8)';
      clouds.forEach(c => {
          ctx.beginPath(); ctx.arc(c.x, c.y, c.size, 0, Math.PI*2); ctx.arc(c.x + c.size*0.8, c.y - c.size*0.3, c.size*0.8, 0, Math.PI*2); ctx.arc(c.x + c.size*1.4, c.y, c.size*0.9, 0, Math.PI*2); ctx.fill();
      });
      ctx.restore();
  }

  ctx.save();
  ctx.translate(-camera.x, 0); 

  let gx = currentLevelData.goal.x; let gy = currentLevelData.goal.y; let gh = currentLevelData.goal.h;
  ctx.fillStyle = '#bdc3c7'; ctx.fillRect(gx + 16, gy, 8, gh); 
  ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(gx + 20, gy, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath(); ctx.moveTo(gx + 24, gy + 10);
  for(let i=0; i<=60; i+=5) { let wave = Math.sin((Date.now()/200) + (i/15)) * 6; ctx.lineTo(gx + 24 + i, gy + 10 + wave); }
  ctx.lineTo(gx + 84, gy + 50 + Math.sin((Date.now()/200) + 4) * 6);
  for(let i=60; i>=0; i-=5) { let wave = Math.sin((Date.now()/200) + (i/15)) * 6; ctx.lineTo(gx + 24 + i, gy + 50 + wave); }
  ctx.fill();

  currentLevelData.platforms.forEach(p => {
    if(p.type === 5) { 
        ctx.fillStyle = onewayColor1; ctx.fillRect(p.x, p.y, p.w, p.h); 
        ctx.fillStyle = onewayColor2; ctx.fillRect(p.x, p.y + p.h - 4, p.w, 4); 
    } 
    else if (p.type === 7) { 
        ctx.fillStyle = '#34495e'; ctx.fillRect(p.x, p.y, p.w, p.h); 
        ctx.fillStyle = '#2c3e50'; ctx.fillRect(p.x, p.y + p.h - 4, p.w, 4); 
        if(p.triggered) {
            let engineGlow = Math.sin(Date.now()/50)*3 + 5;
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(p.x + 10, p.y + p.h, 15, engineGlow); ctx.fillRect(p.x + p.w - 25, p.y + p.h, 15, engineGlow);
        }
        ctx.fillStyle = '#f1c40f'; ctx.fillRect(p.x, p.y, p.w, 4);
    } 
    else { 
        ctx.fillStyle = dirtColor; ctx.fillRect(p.x, p.y, p.w, p.h); 
        ctx.fillStyle = dirtDetail;
        for(let i=10; i<p.w-15; i+=30) { ctx.fillRect(p.x+i, p.y+20, 10, 10); ctx.fillRect(p.x+i+15, p.y+40, 8, 8); }
        ctx.fillStyle = grassColor1; ctx.fillRect(p.x, p.y, p.w, 15);
        ctx.fillStyle = grassColor2; ctx.fillRect(p.x, p.y, p.w, 10);
    }
  });

  decorations.forEach(d => {
      if (d.type === 'alien') { 
          ctx.fillStyle = '#8e44ad'; ctx.fillRect(d.x+10, d.y-20, 5, 20); ctx.fillStyle = '#00f2fe'; ctx.beginPath(); ctx.arc(d.x+12.5, d.y-20, 10, 0, Math.PI, true); ctx.fill();
      } else if (d.type === 'tree') {
          ctx.fillStyle = '#8B4513'; ctx.fillRect(d.x - 5, d.y - 40, 10, 40);
          ctx.fillStyle = isNight ? '#16a085' : '#27ae60'; ctx.beginPath(); ctx.arc(d.x, d.y - 50, 25, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(d.x - 15, d.y - 35, 20, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(d.x + 15, d.y - 35, 20, 0, Math.PI*2); ctx.fill();
      } else { 
          ctx.fillStyle = isNight ? '#16a085' : '#27ae60'; ctx.beginPath(); ctx.arc(d.x+10, d.y-5, 15, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(d.x+25, d.y-5, 12, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(d.x, d.y-5, 10, 0, Math.PI*2); ctx.fill();
      }
  });

  currentLevelData.spikes.forEach(s => {
      ctx.fillStyle = '#bdc3c7'; 
      for(let i=0; i < s.w; i += 20) {
          ctx.beginPath(); 
          if (s.flip) { ctx.moveTo(s.x + i, s.y); ctx.lineTo(s.x + i + 10, s.y + s.h); ctx.lineTo(s.x + i + 20, s.y); } 
          else { ctx.moveTo(s.x + i, s.y + s.h); ctx.lineTo(s.x + i + 10, s.y); ctx.lineTo(s.x + i + 20, s.y + s.h); }
          ctx.fill();
          ctx.fillStyle = '#ecf0f1'; ctx.beginPath(); 
          if (s.flip) { ctx.moveTo(s.x + i + 10, s.y + s.h); ctx.lineTo(s.x + i + 15, s.y); ctx.lineTo(s.x + i + 10, s.y); } 
          else { ctx.moveTo(s.x + i + 10, s.y); ctx.lineTo(s.x + i + 15, s.y + s.h); ctx.lineTo(s.x + i + 10, s.y + s.h); }
          ctx.fill(); ctx.fillStyle = '#bdc3c7'; 
      }
  });

  currentLevelData.lava?.forEach(l => {
      ctx.fillStyle = '#c0392b';
      ctx.beginPath(); ctx.moveTo(l.x, l.y + l.h); ctx.lineTo(l.x, l.y + 10);
      for(let i=0; i<=l.w; i+=10) { let wave = Math.sin((Date.now()/200) + (i/15) + l.x) * 5; ctx.lineTo(l.x + i, l.y + 10 + wave); }
      ctx.lineTo(l.x + l.w, l.y + l.h); ctx.fill();
      ctx.fillStyle = 'rgba(243, 156, 18, 0.8)'; ctx.fillRect(l.x, l.y + 10, l.w, 8);
      
      if(Math.random() > 0.8) {
          ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(l.x + Math.random()*l.w, l.y + 10, Math.random()*4+2, 0, Math.PI*2); ctx.fill();
      }
  });

  currentLevelData.blocks.forEach(b => {
    if (b.type === 1 || b.type === 8 || b.type === 9 || b.type === 10) { 
        if (b.type === 8 || b.type === 9) {
            ctx.fillStyle = '#d35400'; ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.fillStyle = '#e67e22'; ctx.fillRect(b.x, b.y, b.w, 4); ctx.fillStyle = '#a04000'; ctx.fillRect(b.x, b.y + b.h - 4, b.w, 4); ctx.fillRect(b.x + b.w - 4, b.y, 4, b.h);
            ctx.fillStyle = '#873600'; ctx.fillRect(b.x, b.y + 18, b.w, 2); ctx.fillRect(b.x + 18, b.y, 2, 18); ctx.fillRect(b.x + 10, b.y + 20, 2, 20); ctx.fillRect(b.x + 30, b.y + 20, 2, 20);
        } else {
            ctx.fillStyle = '#c0392b'; ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(b.x, b.y, b.w, 4); ctx.fillStyle = '#922b21'; ctx.fillRect(b.x, b.y + b.h - 4, b.w, 4); ctx.fillRect(b.x + b.w - 4, b.y, 4, b.h); 
            ctx.fillStyle = '#641e16'; ctx.fillRect(b.x, b.y + 18, b.w, 3); ctx.fillRect(b.x + 18, b.y, 3, 18); ctx.fillRect(b.x + 10, b.y + 20, 3, 20); ctx.fillRect(b.x + 30, b.y + 20, 3, 20);
        }
        
        if (b.type === 10) {
            let pulse = Math.sin(Date.now() / 150) * 15;
            ctx.fillStyle = `#e69c00`; ctx.fillRect(b.x, b.y, b.w, b.h);

function gameLoop(time) { 
    if (!lastTime) lastTime = time;
    deltaTime = (time - lastTime) / 16.67; 
    lastTime = time;
    
    if (deltaTime > 3) deltaTime = 3; 

    update(deltaTime); 
    draw(); 
    
    animationFrameId = requestAnimationFrame(gameLoop);
}

const bindBtn = (id, key) => {
  const btn = document.getElementById(id);
  const press = (e) => { 
      if(e.cancelable) e.preventDefault(); 
      keys[key] = true; 
      
      // SISTEMA DE DUPLO CLIQUE (Bola de Pelo)
      if(key === 'left' || key === 'right') {
          let now = Date.now();
          if(now - lastDirKeyTime < 300 && lastDirKey === key) {
              shootHairball(key === 'right');
          }
          lastDirKeyTime = now;
          lastDirKey = key;
      }
  };
  const release = (e) => { if(e.cancelable) e.preventDefault(); keys[key] = false; if(key === 'jump') keys.jumpHeld = false; };
  btn.addEventListener('touchstart', press, {passive: false}); btn.addEventListener('mousedown', press);
  btn.addEventListener('touchend', release, {passive: false}); btn.addEventListener('mouseup', release);
};
bindBtn('btnLeft', 'left'); bindBtn('btnRight', 'right'); bindBtn('btnJump', 'jump');

window.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') {
      keys.left = true;
      let now = Date.now();
      if(now - lastDirKeyTime < 300 && lastDirKey === 'left') shootHairball(false);
      lastDirKeyTime = now; lastDirKey = 'left';
  } 
  if(e.key === 'ArrowRight') {
      keys.right = true;
      let now = Date.now();
      if(now - lastDirKeyTime < 300 && lastDirKey === 'right') shootHairball(true);
      lastDirKeyTime = now; lastDirKey = 'right';
  } 
  if(e.key === 'ArrowUp' || e.key === ' ') keys.jump = true;
});
window.addEventListener('keyup', (e) => {
  if(e.key === 'ArrowLeft') keys.left = false; if(e.key === 'ArrowRight') keys.right = false; if(e.key === 'ArrowUp' || e.key === ' ') { keys.jump = false; keys.jumpHeld = false; }
});

initGame();

</script>
